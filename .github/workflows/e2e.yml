# =============================================================================
# E2E Tests — PR Pipeline
# =============================================================================
#
# Fast feedback on every push and pull request.
# Runs only Chromium (desktop) to keep the pipeline under 5 minutes.
# Full cross-browser regression runs nightly — see nightly.yml.
#
# Multi-environment support via prefixed secrets:
#   GitHub Environments are paid for private repos — instead we use prefixed
#   secrets in shared space (STAGING_JWT_SECRET, PROD_JWT_SECRET, etc.) with
#   a workflow_dispatch `environment` input (dev / staging / production).
#   The workflow reads the correct prefix and substitutes the right secrets.
#   To add a new environment: add prefixed secrets to GitHub repo settings
#   and extend the "Set environment secrets" step below.

name: E2E Tests

on:
  push:
    branches: [setup/playwright, tests/e2e-suite, dev, main]
  pull_request:
    branches: [main, dev]

  workflow_dispatch:
    inputs:
      grep:
        description: 'Filter tests by tag (e.g. @smoke, @auth, @articles)'
        required: false
        default: ''
      environment:
        description: 'Target environment'
        required: false
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - production

# Cancel previous runs for the same branch/PR — saves runner minutes
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: E2E Chromium
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Read environment-specific secrets based on the selected environment.
      # Dev secrets have no prefix (backwards compatible with existing setup).
      # Staging and production secrets use STAGING_* and PROD_* prefixes.
      # BASE_URL is environment-specific — points to the correct deploy target.
      - name: Set environment secrets
        run: |
          ENV="${{ github.event.inputs.environment || 'dev' }}"
          if [ "$ENV" = "dev" ]; then
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> $GITHUB_ENV
            echo "TEST_USER_EMAIL=${{ secrets.TEST_USER_EMAIL }}" >> $GITHUB_ENV
            echo "TEST_USER_PASSWORD=${{ secrets.TEST_USER_PASSWORD }}" >> $GITHUB_ENV
            echo "TEST_USER_USERNAME=${{ secrets.TEST_USER_USERNAME }}" >> $GITHUB_ENV
            echo "BASE_URL=http://localhost:3000" >> $GITHUB_ENV
          elif [ "$ENV" = "staging" ]; then
            echo "JWT_SECRET=${{ secrets.STAGING_JWT_SECRET }}" >> $GITHUB_ENV
            echo "TEST_USER_EMAIL=${{ secrets.STAGING_TEST_USER_EMAIL }}" >> $GITHUB_ENV
            echo "TEST_USER_PASSWORD=${{ secrets.STAGING_TEST_USER_PASSWORD }}" >> $GITHUB_ENV
            echo "TEST_USER_USERNAME=${{ secrets.STAGING_TEST_USER_USERNAME }}" >> $GITHUB_ENV
            echo "BASE_URL=${{ secrets.STAGING_BASE_URL }}" >> $GITHUB_ENV
          elif [ "$ENV" = "production" ]; then
            echo "JWT_SECRET=${{ secrets.PROD_JWT_SECRET }}" >> $GITHUB_ENV
            echo "TEST_USER_EMAIL=${{ secrets.PROD_TEST_USER_EMAIL }}" >> $GITHUB_ENV
            echo "TEST_USER_PASSWORD=${{ secrets.PROD_TEST_USER_PASSWORD }}" >> $GITHUB_ENV
            echo "TEST_USER_USERNAME=${{ secrets.PROD_TEST_USER_USERNAME }}" >> $GITHUB_ENV
            echo "BASE_URL=${{ secrets.PROD_BASE_URL }}" >> $GITHUB_ENV
          fi

      - name: Set static environment variables
        run: |
          echo "CI=true" >> $GITHUB_ENV
          echo "DATABASE_URL=file:./database.sqlite" >> $GITHUB_ENV
          echo "TEST_DATABASE_URL=file:./test.sqlite" >> $GITHUB_ENV

      - name: Type check
        run: npm run type:check

      - name: Lint
        run: npm run lint:tests

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests (Chromium only)
        run: npx playwright test --project=chromium ${{ github.event.inputs.grep && format('--grep "{0}"', github.event.inputs.grep) || '' }}

      # Create Allure executor info — populates EXECUTORS section in report.
      # Shows which CI run produced this report with a direct link to the run.
      - name: Create Allure executor info
        if: always()
        run: |
          mkdir -p allure-results
          cat > allure-results/executor.json << EOF
          {
            "name": "GitHub Actions",
            "type": "github",
            "url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "buildOrder": ${{ github.run_number }},
            "buildName": "Run #${{ github.run_number }} — chromium",
            "buildUrl": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "reportUrl": "https://chamleck.github.io/realworld-playwright-demo",
            "reportName": "Allure Report"
          }
          EOF

      # Create Allure environment properties — populates ENVIRONMENT section.
      # Shows key facts about the test run for stakeholders.
      - name: Create Allure environment properties
        if: always()
        run: |
          mkdir -p allure-results
          cat > allure-results/environment.properties << EOF
          Browser=chromium
          Base URL=${{ env.BASE_URL }}
          Target environment=${{ github.event.inputs.environment || 'dev' }}
          Branch=${{ github.ref_name }}
          Commit=${{ github.sha }}
          Run number=${{ github.run_number }}
          EOF

      # Copy categories.json into allure-results before generating report
      # so Allure classifies known bugs correctly in the report.
      - name: Copy Allure categories config
        if: always()
        run: cp tests/allure-config/categories.json allure-results/categories.json

      - name: Generate Allure report
        if: always()
        run: npm run allure:generate

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: allure-results/
          retention-days: 14

      - name: Upload Allure report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: allure-report/
          retention-days: 14

      - name: Upload test results (traces, screenshots, videos)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: test-results/
          retention-days: 7

      - name: Publish report summary
        if: always()
        run: |
         echo "## 📊 Allure Report" >> $GITHUB_STEP_SUMMARY
         echo "[Open live report](https://chamleck.github.io/realworld-playwright-demo)" >> $GITHUB_STEP_SUMMARY