# =============================================================================
# E2E Tests — PR Pipeline
# =============================================================================
#
# Fast feedback on every push and pull request.
# Runs only Chromium (desktop) to keep the pipeline under 5 minutes.
# Full cross-browser regression runs nightly — see nightly.yml.

name: E2E Tests

on:
  push:
    branches: [setup/playwright, tests/e2e-suite, dev, main]
  pull_request:
    branches: [main, dev]

  # Allow manual trigger from GitHub UI (Actions tab → Run workflow)
  workflow_dispatch:
    inputs:
      grep:
        description: 'Filter tests by tag (e.g. @smoke, @auth, @articles)'
        required: false
        default: ''

# Cancel previous runs for the same branch/PR — saves runner minutes
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: E2E Chromium
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      CI: true
      BASE_URL: http://localhost:3000
      DATABASE_URL: file:./database.sqlite
      TEST_DATABASE_URL: file:./test.sqlite
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
      TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
      TEST_USER_USERNAME: ${{ secrets.TEST_USER_USERNAME }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests (Chromium only)
        run: npx playwright test --project=chromium ${{ github.event.inputs.grep && format('--grep "{0}"', github.event.inputs.grep) || '' }}

      - name: Generate Allure report
        if: always()
        run: npm run allure:generate

      # Upload test artifacts for debugging failed tests
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload Allure report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: allure-report/
          retention-days: 14

      - name: Upload test results (traces, screenshots, videos)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: test-results/
          retention-days: 7